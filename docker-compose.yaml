services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tinycms
      POSTGRES_PASSWORD: tinycms
      POSTGRES_DB: tinycms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinycms"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/tinycms-assets;
      mc mb --ignore-existing local/my-blog-assets;
      mc mb --ignore-existing local/my-shop-assets;
      mc anonymous set download local/tinycms-assets;
      mc anonymous set download local/my-blog-assets;
      mc anonymous set download local/my-shop-assets;
      "

volumes:
  postgres_data:
  minio_data:
